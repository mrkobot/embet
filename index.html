<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>emBET</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f7f8fc;--surface:#fff;--border:rgba(0,0,0,.09);--border-md:rgba(0,0,0,.15);
      --text:#111827;--text2:#6b7280;--text3:#9ca3af;
      --accent:#3b5bdb;--accent-bg:#eef2ff;--accent-bd:rgba(59,91,219,.25);
      --green:#16a34a;--green-bg:#f0fdf4;--green-bd:rgba(22,163,74,.25);
      --red:#dc2626;--red-bg:#fef2f2;--red-bd:rgba(220,38,38,.25);
      --amber:#d97706;--amber-bg:#fffbeb;--amber-bd:rgba(217,119,6,.25);
      --mono:'JetBrains Mono','Courier New',monospace;
      --sans:'Inter',system-ui,sans-serif;--r:8px;
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#0c0e18;--surface:#151824;--border:rgba(255,255,255,.07);--border-md:rgba(255,255,255,.13);
      --text:#e8ecff;--text2:#8891b2;--text3:#5d6585;
      --accent:#6c8cff;--accent-bg:rgba(108,140,255,.1);--accent-bd:rgba(108,140,255,.3);
      --green:#4ade80;--green-bg:rgba(74,222,128,.08);--green-bd:rgba(74,222,128,.25);
      --red:#f87171;--red-bg:rgba(248,113,113,.08);--red-bd:rgba(248,113,113,.25);
      --amber:#fbbf24;--amber-bg:rgba(251,191,36,.08);--amber-bd:rgba(251,191,36,.25);
    }}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
    .wrap{max-width:640px;margin:0 auto;padding:28px 16px 64px}
    .card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:20px 22px;margin-bottom:12px}
    .near-card{background:var(--surface);border:.5px solid var(--border);border-left:3px solid var(--accent);border-radius:0;padding:20px 22px;margin-bottom:12px}
    .future-card{background:var(--surface);border:.5px solid var(--border);border-left:3px solid var(--amber);border-radius:0;padding:20px 22px;margin-bottom:12px}
    .divider{display:flex;align-items:center;gap:10px;margin:20px 0 14px;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--text3)}
    .divider::before,.divider::after{content:'';flex:1;height:.5px;background:var(--border)}
    .lbl{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:4px}
    .mono{font-family:var(--mono)}
    .btn{background:transparent;border:.5px solid var(--border-md);border-radius:6px;color:var(--text);padding:6px 13px;cursor:pointer;font-size:13px;font-family:var(--sans)}
    .btn:hover{background:var(--accent-bg)}
    .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap}
    .b-n{background:var(--bg);color:var(--text2);border:.5px solid var(--border-md)}
    .b-i{background:var(--accent-bg);color:var(--accent);border:.5px solid var(--accent-bd)}
    .b-s{background:var(--green-bg);color:var(--green);border:.5px solid var(--green-bd)}
    .b-d{background:var(--red-bg);color:var(--red);border:.5px solid var(--red-bd)}
    .b-w{background:var(--amber-bg);color:var(--amber);border:.5px solid var(--amber-bd)}
    .rbtn{flex:1;padding:12px 8px;border-radius:6px;cursor:pointer;font-size:13px;border:.5px solid var(--border-md);background:var(--bg);color:var(--text2);font-family:var(--sans)}
    .rbtn.W{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);font-weight:500}
    .rbtn.L{background:var(--red-bg);color:var(--red);border-color:var(--red-bd);font-weight:500}
    .rbtn.P{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd);font-weight:500}
    .tbl{width:100%;border-collapse:collapse}
    .tbl td{padding:8px 14px;border-bottom:.5px solid var(--border);vertical-align:middle}
    .empty-w{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:12px;font-size:13px;color:var(--text2)}
    .info-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;padding:12px 14px;background:var(--bg);border-radius:6px}
    .foot{text-align:center;margin-top:44px;font-size:11px;color:var(--text3);line-height:1.8}
  </style>
</head>
<body>
<div class="wrap">
  <div id="app"></div>
  <div class="foot">
    emBET scans lines across DraftKings, FanDuel, BetMGM, Caesars, Pinnacle, and others.<br>
    Outlier detection using Shin's de-vig method. Refreshes daily at 6AM Pacific.
  </div>
</div>
<script>
// ── Constants ──────────────────────────────────────────────────────────────
const AK       = '9063deb84cabe194eaf2fed33045bdbc';
const OB       = 'https://api.the-odds-api.com/v4';
const BKS      = 'pinnacle,draftkings,fanduel,betmgm,caesars,pointsbetus,betrivers,williamhill_us';
const START    = 'June 17, 2026';
const FLAT     = 10;
const MIN_BOOKS = 4;    // minimum books per pool for a valid consensus
const MIN_GAP   = 0.025; // 2.5 percentage-point minimum deviation to surface
const H72      = 72 * 3600 * 1000;   // 3-day window in ms
const H90D     = 90 * 86400 * 1000;  // 90-day window in ms
const PRI = [
  'baseball_mlb','basketball_nba','icehockey_nhl',
  'americanfootball_nfl','americanfootball_ncaaf',
  'basketball_ncaab','basketball_wnba',
  'soccer_usa_mls','soccer_epl'
];

// ── Math ───────────────────────────────────────────────────────────────────
const tD = o => o > 0 ? o/100+1 : 100/Math.abs(o)+1;
const iP = o => 1/tD(o);
const tA = d => d >= 2 ? Math.round((d-1)*100) : Math.round(-100/(d-1));

// Shin's method: binary-search for z that makes de-vigged probs sum to 1.
// For a 2-way market with raw implied probs [p1, p2] (sum > 1):
// fair_i = (sqrt(z² + 4(1−z)·πᵢ) − z) / (2(1−z))  where πᵢ = pᵢ/S
// z is the Shin "insider fraction" parameter; larger overround → larger z.
function shin([p1, p2]) {
  const S  = p1 + p2;
  const pi = [p1/S, p2/S]; // normalised (sums to 1)
  // At z=0, each fair_i = sqrt(πᵢ) → sum > 1.
  // As z→1, fair_i → πᵢ → sum = 1. Sum is monotone decreasing in z.
  // Binary-search for the z where sum = 1.
  let lo = 0, hi = 1 - 1e-9;
  for (let i = 0; i < 64; i++) {
    const z   = (lo + hi) / 2;
    const d2  = 2 * (1 - z);
    const sum = pi[0] === pi[1]
      ? 2 * (Math.sqrt(z*z + 4*(1-z)*pi[0]) - z) / d2
      : pi.reduce((a, p) => a + (Math.sqrt(z*z + 4*(1-z)*p) - z) / d2, 0);
    if (sum > 1) lo = z; else hi = z;
  }
  const z  = (lo + hi) / 2;
  const d2 = 2 * (1 - z);
  const q  = pi.map(p => (Math.sqrt(z*z + 4*(1-z)*p) - z) / d2);
  const qs = q[0] + q[1];
  return [q[0]/qs, q[1]/qs]; // normalise to handle fp rounding
}

// ── Format ─────────────────────────────────────────────────────────────────
const fO    = o => o == null ? '—' : o > 0 ? `+${o}` : `${o}`;
const fPct  = v => `${(v*100).toFixed(1)}%`;
const fGap  = v => `+${(v*100).toFixed(1)}pp`;
const fDT   = iso => new Date(iso).toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
const fDate = iso => new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
const today = () => new Date().toISOString().slice(0,10);
const uid   = () => Math.random().toString(36).slice(2,8);
const esc   = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function daysUntil(iso) {
  return Math.ceil((new Date(iso) - Date.now()) / 86400000);
}

// Returns true if picks were generated before the most recent 6AM Pacific.
// Uses Intl to handle PST/PDT automatically.
function isStale(generatedAt) {
  if (!generatedAt) return true;
  const now       = new Date();
  const parts     = new Intl.DateTimeFormat('en-US', {
    timeZone:'America/Los_Angeles',
    year:'numeric',month:'numeric',day:'numeric',
    hour:'numeric',minute:'numeric',second:'numeric',hour12:false
  }).formatToParts(now);
  const g = t => parseInt(parts.find(p=>p.type===t).value);
  // PT time expressed as a UTC-anchored Date for offset calculation
  const ptAsLocal = new Date(Date.UTC(g('year'),g('month')-1,g('day'),g('hour'),g('minute'),g('second')));
  const ptOffset  = now.getTime() - ptAsLocal.getTime(); // ms to add to PT time to get UTC
  // Today's 6AM PT expressed as UTC
  const pt6am = new Date(Date.UTC(g('year'),g('month')-1,g('day'),6,0,0));
  const threshold6am = new Date(pt6am.getTime() + ptOffset);
  // If we haven't reached 6AM PT today yet, yesterday's 6AM is the threshold
  const threshold = threshold6am > now
    ? new Date(threshold6am.getTime() - 86400000)
    : threshold6am;
  return new Date(generatedAt) < threshold;
}

// ── Storage ────────────────────────────────────────────────────────────────
const mem = {};
const LS  = {
  get(k)   { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch { return mem[k]||null; } },
  set(k,v) { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} mem[k]=v; }
};

// ── State ──────────────────────────────────────────────────────────────────
const st = { loading:true, err:'', picks:null, history:[], showHist:false, settleId:null };

// ── Helpers ────────────────────────────────────────────────────────────────
const bdg    = (cls,txt) => `<span class="badge b-${cls||'n'}">${esc(String(txt))}</span>`;
const getRes = id => st.history.find(h=>h.id===id)?.result||null;

// ── Pick card ──────────────────────────────────────────────────────────────
function rCard(p, type) {
  if (!p) return '';
  const res      = getRes(p.id);
  const resBadge = res
    ? `<div style="margin-top:10px">${bdg(res==='W'?'s':res==='L'?'d':'w', res==='W'?'Won':res==='L'?'Lost':'Push')}</div>`
    : '';
  const days    = daysUntil(p.commenceTime);
  const daysTxt = days <= 0 ? 'Today' : days === 1 ? 'Tomorrow' : `${days} days away`;
  const isNear  = type === 'near';

  return `
  <div class="${type}-card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px">
      <div style="flex:1;min-width:0">
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px">
          ${bdg('n',p.sport)} ${bdg('n',p.mkt)} ${bdg('n',`${p.booksInPool} books`)} ${bdg('n',daysTxt)}
        </div>
        <div style="font-size:${isNear?18:15}px;font-weight:500;margin-bottom:3px">${esc(p.bet)}</div>
        <div style="font-size:13px;color:var(--text2)">${esc(p.game)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:3px">${fDT(p.commenceTime)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="mono" style="font-size:${isNear?30:22}px;font-weight:500;color:var(--green);line-height:1">${fGap(p.gap)}</div>
        <div class="lbl" style="margin-top:3px;margin-bottom:0">off consensus</div>
      </div>
    </div>

    <div class="info-grid">
      <div>
        <span class="lbl">Bet at</span>
        <div style="font-size:${isNear?15:13}px;font-weight:500">${esc(p.book)}</div>
      </div>
      <div>
        <span class="lbl">Line</span>
        <div class="mono" style="font-size:${isNear?20:16}px;font-weight:500">${fO(p.line)}</div>
      </div>
      <div>
        <span class="lbl">Implied</span>
        <div class="mono" style="font-size:15px;color:var(--text2)">${fPct(p.bookImplied)}</div>
      </div>
      <div>
        <span class="lbl">Consensus</span>
        <div class="mono" style="font-size:15px;color:var(--green)">${fPct(p.consensus)}</div>
      </div>
    </div>
    <div style="margin-top:8px;font-size:11px;color:var(--text3)">
      ${esc(p.book)} prices this at ${fPct(p.bookImplied)} — the ${p.booksInPool}-book consensus says ${fPct(p.consensus)}.
      You are getting better-than-market odds by ${fGap(p.gap)}.
    </div>
    ${resBadge}

    <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:14px">
      ${res ? '' : ['W','L','P'].map(r=>`<button class="rbtn${getRes(p.id)===r?' '+r:''}" onclick="EL.settle('${p.id}','${r}')">${r==='W'?'Mark won':r==='L'?'Mark lost':'Push'}</button>`).join('')}
      ${res ? bdg(res==='W'?'s':res==='L'?'d':'w', res==='W'?'Won':res==='L'?'Lost':'Push') : ''}
    </div>
  </div>`;
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!app) return;

  // Settle modal
  if (st.settleId) {
    const p = [st.picks?.near, st.picks?.future, ...st.history].find(x => x&&x.id===st.settleId);
    if (!p) { st.settleId=null; render(); return; }
    const cur = getRes(p.id)||'';
    app.innerHTML = `
    <div style="max-width:380px;margin:40px auto">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <span style="font-weight:500;font-size:16px">Settle pick</span>
          <button style="background:none;border:none;cursor:pointer;color:var(--text2);font-size:22px;line-height:1;padding:0" onclick="EL.closeSettle()">×</button>
        </div>
        <div style="font-size:13px;font-weight:500;margin-bottom:3px">${esc(p.bet)}</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:18px">${esc(p.game)}</div>
        <div style="display:flex;gap:8px">${['W','L','P'].map(r=>`<button class="rbtn${cur===r?' '+r:''}" onclick="EL.settle('${p.id}','${r}')">${r==='W'?'Win':r==='L'?'Loss':'Push'}</button>`).join('')}</div>
        <div style="display:flex;justify-content:flex-end;margin-top:14px"><button class="btn" onclick="EL.closeSettle()">Cancel</button></div>
      </div>
    </div>`;
    return;
  }

  // Stats
  const settled = st.history.filter(p=>p.result);
  const W = settled.filter(p=>p.result==='W').length;
  const L = settled.filter(p=>p.result==='L').length;
  const P = settled.filter(p=>p.result==='P').length;
  const pnl = settled.reduce((s,p)=>{
    if(p.result==='W') return s+FLAT*(tD(p.line)-1);
    if(p.result==='L') return s-FLAT;
    return s;
  },0);
  const hasPF  = (W+L+P)>0;
  const pColor = pnl>=0?'var(--green)':'var(--red)';

  // History table
  const todayPicks = [st.picks?.near,st.picks?.future].filter(Boolean);
  const allHist    = [...todayPicks,...st.history.filter(h=>!todayPicks.find(t=>t.id===h.id))]
    .sort((a,b)=>new Date(b.commenceTime)-new Date(a.commenceTime)).slice(0,14);

  const histRows = allHist.map(p=>{
    const r   = getRes(p.id)||p.result;
    const tag = r
      ? bdg(r==='W'?'s':r==='L'?'d':'w',r==='W'?'Win':r==='L'?'Loss':'Push')
      : `<button class="btn" style="padding:3px 8px;font-size:11px" onclick="EL.openSettle('${p.id}')">Settle</button>`;
    return `<tr>
      <td style="font-size:11px;color:var(--text2);white-space:nowrap">${fDate(p.commenceTime)}</td>
      <td><div style="font-size:12px;font-weight:500">${esc(p.bet)}</div><div style="font-size:11px;color:var(--text2)">${esc(p.game)}</div></td>
      <td style="white-space:nowrap"><span class="mono" style="font-size:12px">${fO(p.line)}</span> ${bdg('n',p.sport)} ${bdg(p.horizon==='future'?'w':'i',p.horizon==='future'?'future':'near')}</td>
      <td><span class="mono" style="font-size:12px;color:var(--green)">${fGap(p.gap)}</span></td>
      <td>${tag}</td>
    </tr>`;
  }).join('');

  const errHint = st.err&&(st.err.toLowerCase().includes('fetch')||st.err.toLowerCase().includes('network')||st.err.toLowerCase().includes('failed'))
    ? `<div style="margin-top:10px;font-size:12px;color:var(--text2)">emBET requires direct network access to the-odds-api.com. Download this file and open it in your browser, or host it at mrkobot.github.io/embet.</div>` : '';

  const hasPicks = st.picks?.near||st.picks?.future;

  // Next 6AM PT display
  const now   = new Date();
  const ptStr = now.toLocaleString('en-US',{timeZone:'America/Los_Angeles',hour:'numeric',minute:'2-digit',hour12:true});
  const scanTime = st.picks ? `Scanned at ${new Date(st.picks.generatedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true})} &middot; ` : '';

  app.innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
    <div style="font-size:30px;font-weight:500;letter-spacing:-1.5px;color:var(--text)">em<span style="color:var(--accent)">BET</span></div>
    <div style="font-size:12px;color:var(--text2)">${now.toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'})}</div>
  </div>
  <div style="font-size:12px;color:var(--text3);margin-bottom:22px;min-height:18px">
    ${st.picks
      ? `${scanTime}${st.picks.total} outlier plays found &middot; Refreshes daily at 6AM Pacific`
      : st.loading ? 'Scanning active lines&hellip;' : 'Refreshes daily at 6AM Pacific'}
  </div>

  ${st.err?`<div style="background:var(--red-bg);color:var(--red);border:.5px solid var(--red-bd);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;line-height:1.6">
    <div style="font-weight:500;margin-bottom:3px;font-size:13px">Could not fetch odds</div>
    <div style="font-size:13px">${esc(st.err)}</div>${errHint}
    <div style="margin-top:10px"><button class="btn" style="font-size:12px" onclick="EL.retry()">Try again</button></div>
  </div>`:''}

  ${st.loading&&!st.picks?`<div style="text-align:center;padding:80px 0;color:var(--text2)">
    <div class="mono" style="font-size:20px;letter-spacing:6px;color:var(--text3);margin-bottom:16px">···</div>
    <div style="font-size:13px">Scanning active lines for outliers</div>
  </div>`:''}

  ${!st.loading&&!hasPicks&&!st.err?`<div style="text-align:center;padding:80px 0;color:var(--text2)">
    <div style="font-size:15px;font-weight:500;color:var(--text);margin-bottom:8px">No plays found</div>
    <div style="font-size:13px">No outlier lines across active sports with ${MIN_BOOKS}+ books and ${(MIN_GAP*100).toFixed(0)}pp+ deviation. Check back when more games are priced.</div>
  </div>`:''}

  ${hasPicks?`<div class="divider">Bet within 3 days</div>`:''}
  ${st.picks?.near?rCard(st.picks.near,'near'):hasPicks?`<div class="empty-w">No outlier lines found for games in the next 72 hours.</div>`:''}

  ${hasPicks?`<div class="divider">Plan ahead — within 3 months</div>`:''}
  ${st.picks?.future?rCard(st.picks.future,'future'):hasPicks?`<div class="empty-w">No qualifying outlier lines found in the 3-month window.</div>`:''}

  <div class="card" style="font-size:13px;line-height:1.8;margin-top:8px">
    <div class="lbl" style="margin-bottom:6px">Track record since ${START}</div>
    ${hasPF
      ? `<span style="font-weight:500">${W}W&thinsp;&mdash;&thinsp;${L}L${P>0?`&thinsp;&mdash;&thinsp;${P}P`:''}</span>
         &ensp;&middot;&ensp;<span class="mono" style="font-weight:500;color:${pColor}">${pnl>=0?'+':''}$${Math.abs(pnl).toFixed(2)}</span>
         <span style="color:var(--text2)"> at $${FLAT} flat</span>`
      : `<span style="color:var(--text2)">No results recorded yet. Settle each pick after the game finishes.</span>`}
  </div>

  ${allHist.length>0?`<div class="card" style="padding:0;overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer" onclick="EL.toggleHist()">
      <span style="font-size:13px;font-weight:500">Pick history</span>
      <button class="btn" style="font-size:11px;padding:3px 10px">${st.showHist?'Hide':'Show'}</button>
    </div>
    ${st.showHist?`<div style="overflow-x:auto"><table class="tbl"><tbody>${histRows}</tbody></table></div>`:''}
  </div>`:''}
  `;
}

// ── Event handlers ─────────────────────────────────────────────────────────
window.EL = {
  openSettle(id)  { st.settleId=id; render(); },
  closeSettle()   { st.settleId=null; render(); },
  toggleHist()    { st.showHist=!st.showHist; render(); },
  retry()         { st.err=''; st.loading=true; render(); scan(); },
  async settle(id, result) {
    const pick = [st.picks?.near,st.picks?.future,...st.history].find(p=>p&&p.id===id);
    if (!pick) return;
    const done = {...pick, result, settledAt:new Date().toISOString()};
    const i    = st.history.findIndex(h=>h.id===id);
    if (i>=0) st.history[i]=done; else st.history.push(done);
    LS.set('embet_history', st.history);
    st.settleId=null; render();
  }
};

// ── Scan ───────────────────────────────────────────────────────────────────
async function scan() {
  try {
    const sRes = await fetch(`${OB}/sports/?apiKey=${AK}`);
    if (!sRes.ok) throw new Error(`Sports list error ${sRes.status}.`);
    const allSports = await sRes.json();
    const active    = allSports.filter(s=>s.active&&!s.has_outrights);
    const sorted    = [...PRI.filter(k=>active.find(s=>s.key===k)),
                       ...active.filter(s=>!PRI.includes(s.key)).map(s=>s.key)].slice(0,8);
    const opps = [];
    const now  = Date.now();
    const c90  = now + H90D;

    for (const sport of sorted) {
      const url = new URL(`${OB}/sports/${sport}/odds/`);
      url.searchParams.set('apiKey',AK); url.searchParams.set('regions','us');
      url.searchParams.set('markets','h2h,spreads,totals');
      url.searchParams.set('oddsFormat','american');
      url.searchParams.set('bookmakers',BKS);

      const res = await fetch(url.toString());
      if (!res.ok) { if(res.status===429) throw new Error('API quota reached.'); continue; }

      const games    = await res.json();
      const sportLbl = allSports.find(s=>s.key===sport)?.title||sport;

      for (const g of games) {
        const ct = new Date(g.commence_time).getTime();
        if (ct <= now || ct > c90) continue; // skip started & too-far games

        for (const mkt of ['h2h','spreads','totals']) {
          // ── Pool by outcome-name + point-value ──────────────────────────
          // pools[poolKey] = [{book, side0:{name,point,price,q}, side1:{...}}]
          const pools = {};

          for (const bm of g.bookmakers) {
            const bmMkt = bm.markets?.find(m=>m.key===mkt);
            if (!bmMkt?.outcomes||bmMkt.outcomes.length!==2) continue;

            // Sort outcomes alphabetically for consistent side0/side1 assignment
            const [o0, o1] = [...bmMkt.outcomes].sort((a,b)=>a.name.localeCompare(b.name));

            // Validate point values and get pool key
            let pKey;
            if (mkt==='h2h') {
              pKey = 'ml';
            } else {
              if (o0.point==null||o1.point==null) continue;
              if (mkt==='spreads'&&Math.abs(Math.abs(o0.point)-Math.abs(o1.point))>0.1) continue;
              if (mkt==='totals'&&Math.abs(o0.point-o1.point)>0.1) continue;
              pKey = Math.abs(o0.point).toFixed(1);
            }

            // Shin de-vig on this book's two-sided market
            const p0 = iP(o0.price), p1b = iP(o1.price);
            const [q0, q1] = shin([p0, p1b]);

            if (!pools[pKey]) pools[pKey]=[];
            pools[pKey].push({
              book: bm.title||bm.key,
              s: [
                {name:o0.name, point:o0.point, price:o0.price, q:q0},
                {name:o1.name, point:o1.point, price:o1.price, q:q1}
              ]
            });
          }

          // ── For each pool: find the biggest outlier ────────────────────
          for (const [pKey, entries] of Object.entries(pools)) {
            if (entries.length < MIN_BOOKS) continue;

            // Consensus = mean de-vigged fair prob for each side
            const cons = [0,1].map(s =>
              entries.reduce((sum,e)=>sum+e.s[s].q,0) / entries.length
            );

            // For each side, find the book whose implied fair prob is LOWEST
            // (i.e., offering the most generous odds vs. the consensus)
            for (const side of [0,1]) {
              const outlier = entries.reduce((best,e)=>e.s[side].q<best.s[side].q?e:best, entries[0]);
              const gap     = cons[side] - outlier.s[side].q;
              if (gap < MIN_GAP) continue;

              const o      = outlier.s[side];
              const mktLbl = mkt==='h2h'?'ML':mkt==='spreads'?'Spread':'Total';
              const pt     = o.point!=null?` (${o.point>0?'+':''}${o.point})`:'';

              opps.push({
                id:uid(), sport:sportLbl,
                game:`${g.away_team} @ ${g.home_team}`,
                commenceTime:g.commence_time,
                mkt:mktLbl, bet:`${o.name}${pt}`,
                book:outlier.book, line:o.price,
                bookImplied:o.q, consensus:cons[side],
                gap, booksInPool:entries.length, result:null
              });
            }
          }
        }
      }
    }

    // Sort by gap descending — biggest outlier first
    opps.sort((a,b)=>b.gap-a.gap);

    const c72    = now + H72;
    const nearP  = opps.find(o=>new Date(o.commenceTime).getTime()<=c72);
    const futP   = opps.find(o=>{const t=new Date(o.commenceTime).getTime();return t>c72&&t<=c90;});

    const picks  = {
      date:today(), generatedAt:new Date().toISOString(),
      near:  nearP ? {...nearP,  horizon:'near'}   : null,
      future:futP  ? {...futP,   horizon:'future'} : null,
      total: opps.length
    };
    st.picks = picks;
    LS.set('embet_picks_'+today(), picks);

  } catch(e) { st.err=e.message||'Failed to fetch odds.'; }
  st.loading=false; render();
}

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  const h = LS.get('embet_history');
  if (h) st.history=h;

  const cached = LS.get('embet_picks_'+today());
  // Accept cache only if it's the new format AND not stale (past today's 6AM PT)
  if (cached && 'near' in cached && !isStale(cached.generatedAt)) {
    st.picks=cached; st.loading=false; render();
  } else {
    render(); scan();
  }
}

init();
</script>
