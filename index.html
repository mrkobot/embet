<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>emBET</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f8fc;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.09);
      --border-md: rgba(0,0,0,0.15);
      --text: #111827;
      --text2: #6b7280;
      --text3: #9ca3af;
      --accent: #3b5bdb;
      --accent-bg: #eef2ff;
      --accent-border: rgba(59,91,219,0.25);
      --green: #16a34a;
      --green-bg: #f0fdf4;
      --green-border: rgba(22,163,74,0.25);
      --red: #dc2626;
      --red-bg: #fef2f2;
      --red-border: rgba(220,38,38,0.25);
      --amber: #d97706;
      --amber-bg: #fffbeb;
      --amber-border: rgba(217,119,6,0.25);
      --mono: 'JetBrains Mono', 'Courier New', monospace;
      --sans: 'Inter', system-ui, sans-serif;
      --radius: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c0e18;
        --surface: #151824;
        --border: rgba(255,255,255,0.07);
        --border-md: rgba(255,255,255,0.13);
        --text: #e8ecff;
        --text2: #8891b2;
        --text3: #5d6585;
        --accent: #6c8cff;
        --accent-bg: rgba(108,140,255,0.1);
        --accent-border: rgba(108,140,255,0.3);
        --green: #4ade80;
        --green-bg: rgba(74,222,128,0.08);
        --green-border: rgba(74,222,128,0.25);
        --red: #f87171;
        --red-bg: rgba(248,113,113,0.08);
        --red-border: rgba(248,113,113,0.25);
        --amber: #fbbf24;
        --amber-bg: rgba(251,191,36,0.08);
        --amber-border: rgba(251,191,36,0.25);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }
    .wrap { max-width: 620px; margin: 0 auto; padding: 28px 16px 64px; }
    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      margin-bottom: 12px;
    }
    .pick-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 0;
      padding: 20px 22px;
      margin-bottom: 12px;
    }
    .alt-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-left: 3px solid var(--amber);
      border-radius: 0;
      padding: 18px 22px;
      margin-bottom: 12px;
    }
    .lbl {
      font-size: 10px;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: var(--text2);
      display: block;
      margin-bottom: 4px;
    }
    .mono { font-family: var(--mono); }
    .btn {
      background: transparent;
      border: 0.5px solid var(--border-md);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 13px;
      cursor: pointer;
      font-size: 13px;
      font-family: var(--sans);
      transition: background 0.1s;
    }
    .btn:hover { background: var(--accent-bg); }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }
    .b-neutral { background: var(--bg); color: var(--text2); border: 0.5px solid var(--border-md); }
    .b-info    { background: var(--accent-bg); color: var(--accent); border: 0.5px solid var(--accent-border); }
    .b-success { background: var(--green-bg);  color: var(--green);  border: 0.5px solid var(--green-border);  }
    .b-danger  { background: var(--red-bg);    color: var(--red);    border: 0.5px solid var(--red-border);    }
    .b-warning { background: var(--amber-bg);  color: var(--amber);  border: 0.5px solid var(--amber-border);  }
    .rbtn {
      flex: 1;
      padding: 12px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      border: 0.5px solid var(--border-md);
      background: var(--bg);
      color: var(--text2);
      font-family: var(--sans);
    }
    .rbtn.W { background: var(--green-bg);  color: var(--green);  border-color: var(--green-border);  font-weight: 500; }
    .rbtn.L { background: var(--red-bg);    color: var(--red);    border-color: var(--red-border);    font-weight: 500; }
    .rbtn.P { background: var(--amber-bg);  color: var(--amber);  border-color: var(--amber-border);  font-weight: 500; }
    .tbl { width: 100%; border-collapse: collapse; }
    .tbl td { padding: 8px 14px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  </style>
</head>
<body>
<div class="wrap">
  <div id="app"></div>
  <div style="text-align:center;margin-top:44px;font-size:11px;color:var(--text3);line-height:1.8">
    emBET scans live lines across DraftKings, FanDuel, BetMGM, Caesars, and others daily.<br>
    EV+ calculations use Pinnacle as the sharp-market reference where available.
  </div>
</div>
<script>
const AK  = '9063deb84cabe194eaf2fed33045bdbc';
const OB  = 'https://api.the-odds-api.com/v4';
const BKS = 'pinnacle,draftkings,fanduel,betmgm,caesars,pointsbetus,betrivers,williamhill_us';
const START = 'June 17, 2026';
const FLAT  = 10;
const PRI = [
  'baseball_mlb','basketball_nba','icehockey_nhl',
  'americanfootball_nfl','americanfootball_ncaaf',
  'basketball_ncaab','basketball_wnba',
  'soccer_usa_mls','soccer_epl'
];

// Math
const tD  = o => o > 0 ? o/100+1 : 100/Math.abs(o)+1;
const iP  = o => 1/tD(o);
const tA  = d => d >= 2 ? Math.round((d-1)*100) : Math.round(-100/(d-1));
const nV  = (a,b) => { const A=iP(a),B=iP(b),t=A+B; return [A/t,B/t]; };
const cEV = (f,o) => f*(tD(o)-1)-(1-f);

// Format
const fO   = o => o == null ? '—' : o > 0 ? `+${o}` : `${o}`;
const fE   = v => `${v >= 0 ? '+' : ''}${(v*100).toFixed(2)}%`;
const fDT  = iso => new Date(iso).toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
const fDate= iso => new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
const today= () => new Date().toISOString().slice(0,10);
const uid  = () => Math.random().toString(36).slice(2,8);
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// Storage — localStorage with in-memory fallback
const mem = {};
const LS = {
  get(k)   { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch { return mem[k]||null; } },
  set(k,v) { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} mem[k]=v; }
};

// State
const st = { loading:true, err:'', picks:null, history:[], showHist:false, settleId:null };

// Helpers
function bdg(cls, text) {
  return `<span class="badge b-${cls||'neutral'}">${esc(String(text))}</span>`;
}
function getRes(id) { return st.history.find(h=>h.id===id)?.result||null; }

// Render a pick card
function rCard(p, pri) {
  if (!p) return '';
  const res      = getRes(p.id);
  const resBadge = res
    ? `<div style="margin-top:10px">${bdg(res==='W'?'success':res==='L'?'danger':'warning', res==='W'?'Win':res==='L'?'Loss':'Push')}</div>`
    : '';
  return `
  <div class="${pri?'pick-card':'alt-card'}">
    ${!pri ? `<div class="lbl" style="margin-bottom:8px">Alternate pick</div>` : ''}
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px">
      <div style="flex:1;min-width:0">
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px">
          ${bdg('neutral',p.sport)} ${bdg('neutral',p.mkt)}
          ${bdg(p.sharp?'info':'warning', p.sharp?'Pinnacle ref':'Consensus')}
        </div>
        <div style="font-size:${pri?18:15}px;font-weight:500;margin-bottom:3px">${esc(p.bet)}</div>
        <div style="font-size:13px;color:var(--text2)">${esc(p.game)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:3px">${fDT(p.commenceTime)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="mono" style="font-size:${pri?30:22}px;font-weight:500;color:var(--green);line-height:1">${fE(p.edge)}</div>
        <div class="lbl" style="margin-top:3px;margin-bottom:0">edge</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:10px 12px;background:var(--bg);border-radius:6px">
      <div>
        <span class="lbl">Book</span>
        <div style="font-size:${pri?15:13}px;font-weight:500">${esc(p.book)}</div>
      </div>
      <div>
        <span class="lbl">Line</span>
        <div class="mono" style="font-size:${pri?22:17}px;font-weight:500">${fO(p.line)}</div>
      </div>
      <div>
        <span class="lbl">Fair value</span>
        <div class="mono" style="font-size:15px;color:var(--text2)">${fO(p.fairOdds)}</div>
      </div>
    </div>
    ${resBadge}
  </div>`;
}

// Main render
function render() {
  const app = document.getElementById('app');
  if (!app) return;

  // Settle modal
  if (st.settleId) {
    const p = [st.picks?.primary, st.picks?.alternate, ...st.history].find(x => x && x.id === st.settleId);
    if (!p) { st.settleId = null; render(); return; }
    const cur = getRes(p.id) || '';
    app.innerHTML = `
    <div style="max-width:380px;margin:40px auto">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <span style="font-weight:500;font-size:16px">Settle pick</span>
          <button style="background:none;border:none;cursor:pointer;color:var(--text2);font-size:22px;line-height:1;padding:0" onclick="EL.closeSettle()">×</button>
        </div>
        <div style="font-size:13px;font-weight:500;margin-bottom:3px">${esc(p.bet)}</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:18px">${esc(p.game)}</div>
        <div style="display:flex;gap:8px">
          ${['W','L','P'].map(r=>`<button class="rbtn${cur===r?' '+r:''}" onclick="EL.settle('${p.id}','${r}')">${r==='W'?'Win':r==='L'?'Loss':'Push'}</button>`).join('')}
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:14px">
          <button class="btn" onclick="EL.closeSettle()">Cancel</button>
        </div>
      </div>
    </div>`;
    return;
  }

  // Performance
  const settled = st.history.filter(p => p.result);
  const W = settled.filter(p => p.result==='W').length;
  const L = settled.filter(p => p.result==='L').length;
  const P = settled.filter(p => p.result==='P').length;
  const pnl = settled.reduce((s,p) => {
    if (p.result==='W') return s + FLAT*(tD(p.line)-1);
    if (p.result==='L') return s - FLAT;
    return s;
  }, 0);
  const hasPF = (W+L+P) > 0;
  const pColor = pnl >= 0 ? 'var(--green)' : 'var(--red)';

  // History rows
  const todayPicks = [st.picks?.primary, st.picks?.alternate].filter(Boolean);
  const pastPicks  = st.history.filter(h => !todayPicks.find(t => t.id===h.id));
  const allHist    = [...todayPicks, ...pastPicks]
    .sort((a,b) => new Date(b.commenceTime) - new Date(a.commenceTime))
    .slice(0, 14);

  const histRows = allHist.map(p => {
    const r   = getRes(p.id) || p.result;
    const tag = r
      ? bdg(r==='W'?'success':r==='L'?'danger':'warning', r==='W'?'Win':r==='L'?'Loss':'Push')
      : `<button class="btn" style="padding:3px 8px;font-size:11px" onclick="EL.openSettle('${p.id}')">Settle</button>`;
    return `<tr>
      <td style="font-size:11px;color:var(--text2);white-space:nowrap">${fDate(p.commenceTime)}</td>
      <td>
        <div style="font-size:12px;font-weight:500">${esc(p.bet)}</div>
        <div style="font-size:11px;color:var(--text2)">${esc(p.game)}</div>
      </td>
      <td style="white-space:nowrap">
        <span class="mono" style="font-size:12px">${fO(p.line)}</span>
        &nbsp;${bdg('neutral',p.sport)}
      </td>
      <td>${tag}</td>
    </tr>`;
  }).join('');

  const errHint = st.err && (st.err.toLowerCase().includes('fetch') || st.err.toLowerCase().includes('network') || st.err.toLowerCase().includes('failed'))
    ? `<div style="margin-top:10px;font-size:12px;color:var(--text2)">
        emBET requires direct network access to the-odds-api.com.
        If you're viewing this inside Claude's artifact viewer, download the file and open it in your browser—or host it on
        <a href="https://pages.github.com" target="_blank" style="color:var(--accent)">GitHub Pages</a> for a shareable link.
      </div>`
    : '';

  app.innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
    <div style="font-size:30px;font-weight:500;letter-spacing:-1.5px;color:var(--text)">em<span style="color:var(--accent)">BET</span></div>
    <div style="font-size:12px;color:var(--text2)">${new Date().toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'})}</div>
  </div>
  <div style="font-size:12px;color:var(--text3);margin-bottom:22px;min-height:18px">
    ${st.picks
      ? `Scanned at ${new Date(st.picks.generatedAt).toLocaleTimeString()} &middot; ${st.picks.total} EV+ plays found`
      : st.loading ? 'Scanning active lines&hellip;' : ''}
  </div>

  ${st.err ? `
  <div style="background:var(--red-bg);color:var(--red);border:0.5px solid var(--red-border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;line-height:1.6">
    <div style="font-weight:500;margin-bottom:3px;font-size:13px">Could not fetch odds</div>
    <div style="font-size:13px">${esc(st.err)}</div>
    ${errHint}
    <div style="margin-top:10px"><button class="btn" style="font-size:12px" onclick="EL.retry()">Try again</button></div>
  </div>` : ''}

  ${st.loading && !st.picks ? `
  <div style="text-align:center;padding:80px 0;color:var(--text2)">
    <div class="mono" style="font-size:20px;letter-spacing:6px;color:var(--text3);margin-bottom:16px">···</div>
    <div style="font-size:13px">Scanning active lines for edge</div>
  </div>` : ''}

  ${!st.loading && !st.picks && !st.err ? `
  <div style="text-align:center;padding:80px 0;color:var(--text2)">
    <div style="font-size:15px;font-weight:500;color:var(--text);margin-bottom:8px">No plays found today</div>
    <div style="font-size:13px">No EV+ opportunities across active sports. Check back when games are scheduled.</div>
  </div>` : ''}

  ${st.picks?.primary  ? rCard(st.picks.primary,  true)  : ''}
  ${st.picks?.alternate ? rCard(st.picks.alternate, false) : ''}

  <div class="card" style="font-size:13px;line-height:1.8">
    <div class="lbl" style="margin-bottom:6px">Track record since ${START}</div>
    ${hasPF
      ? `<span style="font-weight:500">${W}W &thinsp;&mdash;&thinsp; ${L}L${P>0?` &thinsp;&mdash;&thinsp; ${P}P`:''}</span>
         &ensp;&middot;&ensp;
         <span class="mono" style="font-weight:500;color:${pColor}">${pnl>=0?'+':''}$${Math.abs(pnl).toFixed(2)}</span>
         <span style="color:var(--text2)"> at $${FLAT} flat</span>`
      : `<span style="color:var(--text2)">No results recorded yet. Use "Pick history" to settle each pick after games finish.</span>`}
  </div>

  ${allHist.length > 0 ? `
  <div class="card" style="padding:0;overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer" onclick="EL.toggleHist()">
      <span style="font-size:13px;font-weight:500">Pick history</span>
      <button class="btn" style="font-size:11px;padding:3px 10px">${st.showHist?'Hide':'Show'}</button>
    </div>
    ${st.showHist ? `<div style="overflow-x:auto"><table class="tbl"><tbody>${histRows}</tbody></table></div>` : ''}
  </div>` : ''}
  `;
}

// Event handlers
window.EL = {
  openSettle(id)  { st.settleId = id; render(); },
  closeSettle()   { st.settleId = null; render(); },
  toggleHist()    { st.showHist = !st.showHist; render(); },
  retry()         { st.err = ''; st.loading = true; render(); scan(); },
  async settle(id, result) {
    const pick = [st.picks?.primary, st.picks?.alternate, ...st.history].find(p => p && p.id === id);
    if (!pick) return;
    const done = { ...pick, result, settledAt: new Date().toISOString() };
    const i = st.history.findIndex(h => h.id === id);
    if (i >= 0) st.history[i] = done; else st.history.push(done);
    LS.set('embet_history', st.history);
    st.settleId = null;
    render();
  }
};

// Scan the Odds API
async function scan() {
  try {
    const sRes = await fetch(`${OB}/sports/?apiKey=${AK}`);
    if (!sRes.ok) throw new Error(`Sports list error ${sRes.status}. Check the API key.`);
    const allSports = await sRes.json();

    const active = allSports.filter(s => s.active && !s.has_outrights);
    const sorted = [
      ...PRI.filter(k => active.find(s => s.key === k)),
      ...active.filter(s => !PRI.includes(s.key)).map(s => s.key)
    ].slice(0, 8);

    const opps = [];

    for (const sport of sorted) {
      const url = new URL(`${OB}/sports/${sport}/odds/`);
      url.searchParams.set('apiKey',    AK);
      url.searchParams.set('regions',   'us');
      url.searchParams.set('markets',   'h2h,spreads,totals');
      url.searchParams.set('oddsFormat','american');
      url.searchParams.set('bookmakers', BKS);

      const res = await fetch(url.toString());
      if (!res.ok) {
        if (res.status === 429) throw new Error('API quota reached for this period.');
        continue;
      }

      const games    = await res.json();
      const now      = new Date();
      const sportLbl = allSports.find(s => s.key === sport)?.title || sport;

      for (const g of games) {
        if (new Date(g.commence_time) <= now) continue;

        const pin = g.bookmakers.find(b => b.key === 'pinnacle');

        for (const mkt of ['h2h', 'spreads', 'totals']) {
          const pm = pin?.markets?.find(m => m.key === mkt);
          let fm = null, sharpRef = false;

          if (pm?.outcomes?.length === 2) {
            const [a, b] = pm.outcomes;
            const [fa, fb] = nV(a.price, b.price);
            fm = { [a.name]: fa, [b.name]: fb };
            sharpRef = true;
          } else {
            // Consensus fallback
            const pools = {};
            for (const bm of g.bookmakers) {
              const m2 = bm.markets?.find(m => m.key === mkt);
              if (!m2?.outcomes || m2.outcomes.length !== 2) continue;
              for (const o of m2.outcomes) {
                if (!pools[o.name]) pools[o.name] = [];
                pools[o.name].push(o.price);
              }
            }
            const nm = Object.keys(pools);
            if (nm.length === 2 && pools[nm[0]].length >= 2 && pools[nm[1]].length >= 2) {
              const aA = pools[nm[0]].reduce((a,b) => a+b) / pools[nm[0]].length;
              const aB = pools[nm[1]].reduce((a,b) => a+b) / pools[nm[1]].length;
              const [fa, fb] = nV(aA, aB);
              fm = { [nm[0]]: fa, [nm[1]]: fb };
            }
          }

          if (!fm) continue;

          for (const bm of g.bookmakers) {
            if (bm.key === 'pinnacle') continue;
            const m = bm.markets?.find(m => m.key === mkt);
            if (!m?.outcomes) continue;

            for (const o of m.outcomes) {
              const fair = fm[o.name];
              if (fair == null) continue;
              const edge = cEV(fair, o.price);
              if (edge <= 0) continue;

              const mktLbl = mkt === 'h2h' ? 'ML' : mkt === 'spreads' ? 'Spread' : 'Total';
              const pt     = o.point != null ? ` (${o.point > 0 ? '+' : ''}${o.point})` : '';

              opps.push({
                id:           uid(),
                sport:        sportLbl,
                game:         `${g.away_team} @ ${g.home_team}`,
                commenceTime: g.commence_time,
                mkt:          mktLbl,
                bet:          `${o.name}${pt}`,
                book:         bm.title || bm.key,
                line:         o.price,
                fairOdds:     tA(1 / fair),
                fairProb:     fair,
                edge,
                sharp:        sharpRef,
                result:       null
              });
            }
          }
        }
      }
    }

    // Sort: Pinnacle-referenced picks get a slight priority boost, then by edge magnitude
    opps.sort((a, b) =>
      (b.edge + (b.sharp ? 0.001 : 0)) - (a.edge + (a.sharp ? 0.001 : 0))
    );

    const picks = {
      date:         today(),
      generatedAt:  new Date().toISOString(),
      primary:      opps[0] || null,
      alternate:    opps[1] || null,
      total:        opps.length
    };

    st.picks = picks;
    LS.set('embet_picks_' + today(), picks);

  } catch (e) {
    st.err = e.message || 'Failed to fetch odds.';
  }

  st.loading = false;
  render();
}

// Init
function init() {
  const h = LS.get('embet_history');
  if (h) st.history = h;

  const cached = LS.get('embet_picks_' + today());
  if (cached) {
    st.picks   = cached;
    st.loading = false;
    render();
  } else {
    render(); // show loading state immediately
    scan();
  }
}

init();
</script>
